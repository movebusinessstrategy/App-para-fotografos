<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>FocalPoint CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #f0f2f5;
      color: #111b21;
    }

    .header {
      background: #111b21;
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }

    .body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label { font-size: 11px; font-weight: 700; color: #667781; text-transform: uppercase; letter-spacing: 0.5px; }

    input {
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      background: #fff;
      font-family: inherit;
    }
    input:focus { border-color: #00a884; }

    .btn-primary {
      background: #00a884;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { background: #008f6f; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: #667781;
      border: none;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      padding: 4px;
      font-family: inherit;
      text-decoration: underline;
    }

    .status {
      font-size: 12px;
      text-align: center;
      padding: 6px 10px;
      border-radius: 6px;
      min-height: 22px;
    }
    .status.ok { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }

    /* Logged in state */
    .logged-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1.5px solid #e5e7eb;
    }
    .logged-name { font-weight: 700; font-size: 15px; }
    .logged-email { font-size: 12px; color: #667781; }
    .logged-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #00a884;
    }
    .logged-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #00a884;
    }
    .btn-logout {
      background: #f0f2f5;
      color: #667781;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: #e9edef; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>FocalPoint CRM</h1>
      <p>Pipeline para WhatsApp Web</p>
    </div>
  </div>

  <div class="body" id="body-content">
    <!-- preenchido pelo popup.js -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
